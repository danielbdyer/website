# Cspell — typo guard for code, comments, and spec markdown. The wordlist
# is seeded from voice-sensitive surfaces; new domain words earn their
# place by being added here, which is a small ritual that keeps the
# vocabulary deliberate.

version: '0.2'
language: en
ignorePaths:
  - node_modules/**
  - dist/**
  - .stats/**
  - pnpm-lock.yaml
  - public/**/*.svg
  - .claude/**
  - playwright-report/**
  - test-results/**
  - src/app/routeTree.gen.ts
