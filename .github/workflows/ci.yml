# Shared defense-in-depth. Pre-commit hooks catch what a contributor runs
# on their machine; CI catches what they skipped. Keep the local and CI
# checks in sync: when the hook grows a step, so does this workflow.
#
# Quality gates are blocking. PR merges require:
#   - check        (typecheck, lint, vitest, build, size-limit)
#   - playwright   (smoke + comprehensive Playwright suite)
#   - lighthouse   (perf/a11y/bp/seo floors per lighthouserc.cjs)
# Visual regression is part of `playwright`; the first PR after the spec
# is added must update snapshots, after which baseline drift is flagged.
#
# Build runs once in `check` and the dist/ output is shared with the
# downstream jobs via artifacts. This avoids running the prerender three
# times and sidesteps an issue where the prerender's internal fetch was
# failing inside the Playwright Docker container.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Typecheck, lint, test, build, size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Fails the job on any high or critical advisory. The CVE remediation
      # pass (vite 8.0.10, eslint-plugin-boundaries 6.0.2) cleared the
      # baseline; this step keeps new ones from landing unnoticed.
      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Typecheck
        run: pnpm typecheck

      # `pnpm lint` runs eslint + the color-contrast checker (token-level
      # WCAG AA gate; see scripts/check-color-contrast.mjs).
      - name: Lint
        run: pnpm lint

      - name: Test (vitest)
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build

      - name: Bundle size budget
        run: pnpm exec size-limit

      # Share dist/ with the playwright and lighthouse jobs so neither
      # rebuilds. dist/server is excluded — only the static deploy
      # artifact needs to ship downstream.
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-client
          path: dist/client/
          retention-days: 1

  playwright:
    name: Playwright (smoke + comprehensive)
    runs-on: ubuntu-latest
    needs: check
    # Pin the container to the exact Playwright version pinned in
    # package.json. When @playwright/test bumps, bump the image tag in
    # the same PR so the bundled browser binary stays in lockstep with
    # the test runner.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
      options: --user 1001
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Pull the prebuilt static output from the `check` job rather than
      # rebuilding inside the container.
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-client
          path: dist/client/

      # `--grep-invert @visual` skips the visual-regression spec until
      # baseline PNGs are committed (see .github/workflows/update-snapshots.yml).
      # Once the user has triggered that workflow once and the baselines
      # are committed back to the branch, drop the `--grep-invert` flag in
      # a follow-up PR to fold visual regression into the main gate.
      - name: Playwright tests
        run: pnpm exec playwright test --grep-invert @visual
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results (failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-client
          path: dist/client/

      - name: Lighthouse
        run: pnpm exec lhci autorun --config=./lighthouserc.cjs

      # Print scores even on assertion failure — headroom over the floor
      # is the signal you need to decide whether to tighten.
      - name: Print Lighthouse scores
        if: always()
        run: pnpm lighthouse:report

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
