# Shared defense-in-depth. Pre-commit hooks catch what a contributor runs
# on their machine; CI catches what they skipped. Keep the local and CI
# checks in sync: when the hook grows a step, so does this workflow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Fails the job on any high or critical advisory. The CVE remediation
      # pass (vite 8.0.10, eslint-plugin-boundaries 6.0.2) cleared the
      # baseline; this step keeps new ones from landing unnoticed.
      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Lint
        run: pnpm exec eslint src/

      - name: Test
        run: pnpm exec vitest run

      - name: Build
        run: pnpm build

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lighthouse
        run: pnpm exec lhci autorun --config=./lighthouserc.cjs

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
